services:
  - type: web
    name: resume-parser-backend
    env: python
    buildCommand: pip install -r backend/requirements.txt && python backend/manage.py collectstatic --noinput
    startCommand: cd backend && gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 2
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.4
      - key: DJANGO_DEBUG
        value: "0"
      - key: DJANGO_SECRET_KEY
        sync: false
      - key: ALLOWED_HOSTS
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB
        value: skill_assessment
      - key: CORS_ALLOWED_ORIGINS
        sync: false
